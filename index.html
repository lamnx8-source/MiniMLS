<!DOCTYPE html>
<h1>Hello MiniMLS</h1>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>MiniMLS WebMap V1</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    
    <header class="topbar">
     <div class="topbar-controls">
  <select id="baseLayerSelect" title="Base Layer">
    <option value="osm">OSM</option>
    <option value="esri">Esri</option>
  </select>

  <button id="locateBtn" type="button">Locate</button>
  <button id="toggleFiltersBtn" type="button">Filters</button>
  <button id="reloadBtn" type="button">Reload</button>
</div>
    </header>

    <!-- Map -->
    <main id="map"></main>

    <section id="filterPanel" class="filter-panel hidden">
  <div class="filter-panel-inner">
    <div class="filter-row">
      <label for="filterTimeMax">Time ≤ days</label>
      <input id="filterTimeMax" type="number" min="0" placeholder="e.g. 30" />
    </div>

    <div class="filter-row">
      <label for="filterUnitPriceMax">UnitPrice ≤</label>
      <input id="filterUnitPriceMax" type="number" min="0" step="0.1" placeholder="e.g. 20" />
    </div>

    <div class="filter-row">
      <label for="filterRoadWidthMin">RoadWidth ≥</label>
      <input id="filterRoadWidthMin" type="number" min="0" step="0.1" placeholder="e.g. 6" />
    </div>

    <div class="filter-row">
      <label for="filterPoiMin">POI ≥</label>
      <input id="filterPoiMin" type="number" min="0" placeholder="e.g. 3" />
    </div>
    <div class="filter-row">
      <label for="filterAreaMin">Area ≥</label>
      <input id="filterAreaMin" type="number" min="0" step="0.1" placeholder="e.g. 100" />
    </div>

    <div class="filter-actions">
      <button id="applyFiltersBtn" type="button">Apply</button>
      <button id="clearFiltersBtn" type="button">Clear</button>
    </div>
  </div>
</section>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>

  <!-- App modules -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
