<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MiniMLS WebMap</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
  />

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">MiniMLS</div>

      <div class="topbar-controls">
        <select id="baseLayerSelect" title="Base Layer">
          <option value="osm">OSM</option>
          <option value="esri">Esri</option>
        </select>

        <input id="searchInput" type="search" placeholder="Search ID / notes" />

        <button id="locateBtn" type="button">Locate</button>
        <button id="reloadBtn" type="button">Reload</button>
      </div>
    </header>

    <main id="map"></main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
